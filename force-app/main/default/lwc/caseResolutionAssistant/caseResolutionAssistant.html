<template>
    <div
        class="cra-page"
        style="background-color: #2c5282; min-height: 100vh; width: 100%; box-sizing: border-box; padding: 2rem 1rem;">
    <div class="cra-container">

        <div class={sessionBannerClass} role="status">{sessionDisplayLabel}</div>

        <div class={inputClass}>
            <div class="cra-header">
                <h2 class="cra-title">How can we help you today?</h2>
                <p class="cra-subtitle">Get instant AI-powered answers to your questions.</p>
            </div>
            <div class="cra-form" novalidate>
                <div class="cra-row">
                    <div class="cra-field">
                        <label class="cra-label" for="firstName">
                            First Name <span class="cra-required" aria-hidden="true">*</span>
                        </label>
                        <input
                            class={firstNameInputClass}
                            id="firstName"
                            type="text"
                            value={firstName}
                            onchange={handleFirstNameChange}
                            oninput={handleFirstNameChange}
                            onblur={handleFirstNameBlur}
                            required
                            aria-required="true"
                            aria-invalid={firstNameError}
                            autocomplete="given-name" />
                        <template if:true={firstNameError}>
                            <p class="cra-field-error" role="alert">{firstNameError}</p>
                        </template>
                    </div>
                    <div class="cra-field">
                        <label class="cra-label" for="lastName">
                            Last Name <span class="cra-required" aria-hidden="true">*</span>
                        </label>
                        <input
                            class={lastNameInputClass}
                            id="lastName"
                            type="text"
                            value={lastName}
                            onchange={handleLastNameChange}
                            oninput={handleLastNameChange}
                            onblur={handleLastNameBlur}
                            required
                            aria-required="true"
                            aria-invalid={lastNameError}
                            autocomplete="family-name" />
                        <template if:true={lastNameError}>
                            <p class="cra-field-error" role="alert">{lastNameError}</p>
                        </template>
                    </div>
                </div>
                <div class="cra-field">
                    <label class="cra-label" for="product">
                        Product <span class="cra-required" aria-hidden="true">*</span>
                    </label>
                    <select
                        class={productInputClass}
                        id="product"
                        value={product}
                        onchange={handleProductChange}
                        onblur={handleProductBlur}
                        required
                        aria-required="true"
                        aria-invalid={productError}>
                        <option value="">-- Select a product --</option>
                        <template for:each={productOptions} for:item="opt">
                            <option key={opt.value} value={opt.value}>{opt.label}</option>
                        </template>
                    </select>
                    <template if:true={productError}>
                        <p class="cra-field-error" role="alert">{productError}</p>
                    </template>
                </div>
                <div class="cra-field">
                    <label class="cra-label" for="email">
                        Email <span class="cra-required" aria-hidden="true">*</span>
                    </label>
                    <input
                        class={emailInputClass}
                        id="email"
                        type="email"
                        value={email}
                        onchange={handleEmailChange}
                        oninput={handleEmailChange}
                        onblur={handleEmailBlur}
                        required
                        aria-required="true"
                        aria-invalid={emailError}
                        autocomplete="email" />
                    <template if:true={emailError}>
                        <p class="cra-field-error" role="alert">{emailError}</p>
                    </template>
                </div>
                <div class="cra-field">
                    <label class="cra-label" for="question">
                        Your Question <span class="cra-required" aria-hidden="true">*</span>
                    </label>
                    <template if:true={showMicHint}>
                        <div class="cra-voice-hint" role="note">
                            <span class="cra-voice-hint-icon">🎤</span>
                            <span>Prefer to speak? Click the <strong>blue mic button</strong> inside the text box to describe your issue by voice — no typing needed.</span>
                        </div>
                    </template>
                    <div class="cra-textarea-wrapper">
                        <textarea
                            class={questionInputClass}
                            id="question"
                            value={question}
                            onchange={handleQuestionChange}
                            oninput={handleQuestionChange}
                            onblur={handleQuestionBlur}
                            required
                            aria-required="true"
                            aria-invalid={questionError}
                            placeholder="Describe what you need help with..."></textarea>
                        <button
                            class={micButtonClass}
                            type="button"
                            onclick={handleMicToggle}
                            aria-label={micAriaLabel}
                            title={micAriaLabel}>
                            <template if:true={isListening}>
                                <span class="cra-mic-dot" aria-hidden="true"></span>
                            </template>
                            <template if:false={isListening}>
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="18" height="18">
                                    <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zM7 12a1 1 0 0 1 1 1 4 4 0 0 0 8 0 1 1 0 1 1 2 0 6 6 0 0 1-5 5.917V21h2a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2h2v-2.083A6 6 0 0 1 6 13a1 1 0 0 1 1-1z"/>
                                </svg>
                            </template>
                        </button>
                    </div>
                    <template if:true={isListening}>
                        <div class="cra-mic-status" aria-live="polite">
                            <span class="cra-mic-pulse" aria-hidden="true"></span>
                            <span>Listening — speak now</span>
                        </div>
                    </template>
                    <template if:true={micError}>
                        <p class="cra-field-error" role="alert">{micError}</p>
                    </template>
                    <template if:true={questionError}>
                        <p class="cra-field-error" role="alert">{questionError}</p>
                    </template>
                    <div class={questionHintClass} role="alert">{questionHint}</div>
                </div>
                <div class={errorClass}>{errorMessage}</div>
                <button class="cra-button cra-button--primary" onclick={handleSubmit}>
                    Submit
                </button>
            </div>
        </div>

        <div class={clarifyingClass}>
            <div class="cra-loading">
                <div class="cra-spinner"></div>
                <p class="cra-loading-text">Understanding your question...</p>
                <p class="cra-loading-subtext">We're refining it for the best results.</p>
            </div>
        </div>

        <div class={clarificationClass}>
            <div class="cra-header">
                <h2 class="cra-title">Confirm your question</h2>
                <p class="cra-subtitle">We've cleaned up your question. Edit it if needed, answer any quick questions below, then confirm.</p>
            </div>
            <div class="cra-form">
                <div class={clarifyWarningClass} role="alert">{clarifyWarningMessage}</div>
                <div class="cra-field">
                    <label class="cra-label" for="clarifiedQuestion">Your Question</label>
                    <textarea
                        class="cra-input cra-textarea"
                        id="clarifiedQuestion"
                        data-id="clarifiedQuestion"
                        value={clarifiedQuestion}
                        oninput={handleClarifiedQuestionChange}
                        onchange={handleClarifiedQuestionChange}></textarea>
                </div>
                <template if:true={hasClarifications}>
                    <div class="cra-clar-section">
                        <p class="cra-clar-heading">A few quick questions to help us find the best answer:</p>
                        <template for:each={clarifications} for:item="clar">
                            <div key={clar.id} class="cra-clar-group">
                                <p class="cra-clar-question">{clar.question}</p>
                                <div class="cra-clar-options">
                                    <template for:each={clar.options} for:item="opt">
                                        <label key={opt.id} class="cra-clar-option">
                                            <input
                                                type="checkbox"
                                                data-clar-id={clar.id}
                                                data-opt-id={opt.id}
                                                checked={opt.selected}
                                                onchange={handleOptionChange} />
                                            <span>{opt.text}</span>
                                        </label>
                                    </template>
                                    <label class="cra-clar-option">
                                        <input
                                            type="checkbox"
                                            data-clar-id={clar.id}
                                            data-is-other="true"
                                            checked={clar.showOther}
                                            onchange={handleOtherToggle} />
                                        <span>Other</span>
                                    </label>
                                </div>
                                <template if:true={clar.showOther}>
                                    <input
                                        type="text"
                                        class="cra-input cra-clar-other-input"
                                        placeholder="Please specify..."
                                        data-clar-id={clar.id}
                                        value={clar.otherText}
                                        oninput={handleOtherTextChange} />
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
                <div class={errorClass}>{errorMessage}</div>
                <div class="cra-button-row">
                    <button class="cra-button cra-button--secondary" onclick={handleBackToInput}>
                        Back
                    </button>
                    <button class="cra-button cra-button--primary" onclick={handleConfirm}>
                        Confirm &amp; Find Solution
                    </button>
                </div>
            </div>
        </div>

        <div class={loadingClass}>
            <div class="cra-loading">
                <div class="cra-spinner"></div>
                <p class="cra-loading-text">Searching our knowledge base...</p>
                <p class="cra-loading-subtext">This usually takes 10 to 90 seconds.</p>
            </div>
        </div>

        <div class={recommendationClass}>
            <div class={recommendationBadgeClass}>{recommendationBadge}</div>
            <div class="cra-card">
                <h3 class="cra-card-title">{recommendationTitle}</h3>
                <div class="cra-card-body">
                    <lightning-formatted-rich-text value={recommendation}></lightning-formatted-rich-text>
                </div>
            </div>
            <div class="cra-card-question">Did this answer resolve your question?</div>
            <div
                class="cra-spacer"
                style="display: block; height: 1.5rem; min-height: 1.5rem; width: 100%;"
                role="presentation"></div>
            <div class="cra-button-row">
                <button class="cra-button cra-button--primary" onclick={handleYes}>
                    Yes, resolved
                </button>
                <button class="cra-button cra-button--secondary" onclick={handleNo}>
                    No, still need help
                </button>
            </div>
        </div>

        <div class={resolvingClass}>
            <div class="cra-loading">
                <div class="cra-spinner"></div>
                <p class="cra-loading-text">Closing your case...</p>
            </div>
        </div>

        <div class={resolvedClass}>
            <div class="cra-success">
                <div class="cra-success-icon">&check;</div>
                <h2 class="cra-title">Glad we could help!</h2>
                <p class="cra-subtitle">Your case has been closed. Thank you for using our support.</p>
                <div
                    class="cra-spacer"
                    style="display: block; height: 2.5rem; min-height: 2.5rem; width: 100%;"
                    role="presentation"></div>
                <div class="cra-actions">
                    <button class="cra-button cra-button--primary" onclick={handleReset}>
                        Submit Another Question
                    </button>
                </div>
            </div>
        </div>

        <div class={caseCreatedClass}>
            <div class="cra-info">
                <div class="cra-success-icon cra-info-icon">i</div>
                <h2 class="cra-title">A support agent will reach out to you</h2>
                <p class="cra-subtitle">
                    Your case <strong>{caseNumber}</strong> is now in our queue.
                    We'll email you within one business day.
                </p>
                <div
                    class="cra-spacer"
                    style="display: block; height: 2.5rem; min-height: 2.5rem; width: 100%;"
                    role="presentation"></div>
                <div class="cra-actions">
                    <button class="cra-button cra-button--primary" onclick={handleReset}>
                        Done
                    </button>
                </div>
            </div>
        </div>

    </div>
    </div>
</template>
